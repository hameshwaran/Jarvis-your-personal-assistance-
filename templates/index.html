<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. HUD</title>
    <style>
        :root {
            --bg-color: #0A1628;
            --accent-color: #00D4FF;
            --text-color: #E0F7FF;
            --secondary-bg: #1A2F4A;
            --success-color: #00FF88;
            --danger-color: #FF3366;
            --font-family: 'Rajdhani', 'Consolas', monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #112240 0%, #0a192f 100%);
        }

        .hud-container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            background: rgba(10, 22, 40, 0.85);
            backdrop-filter: blur(10px);
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-color);
            letter-spacing: 6px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--success-color);
            box-shadow: 0 0 10px var(--success-color);
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        /* Arc Reactor Visualizer */
        .visualizer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
            height: 200px;
        }

        .arc-reactor {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
            transition: box-shadow 0.3s;
        }

        .arc-reactor.active {
            box-shadow: 0 0 60px rgba(0, 212, 255, 0.8), inset 0 0 20px rgba(0, 212, 255, 0.8);
        }

        .arc-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(0, 212, 255, 0.5);
        }

        .arc-ring.outer {
            width: 100%;
            height: 100%;
            border-style: dashed;
            animation: spin 10s linear infinite;
        }

        .arc-ring.inner {
            width: 70%;
            height: 70%;
            border: 2px solid var(--accent-color);
            animation: spin-reverse 8s linear infinite;
        }

        .arc-core {
            width: 30%;
            height: 30%;
            background: var(--text-color);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--text-color);
            transition: transform 0.1s;
        }

        .arc-reactor.active .arc-core {
            animation: pulse 1s ease-in-out infinite alternate;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 10px #fff; } 100% { transform: scale(1.2); box-shadow: 0 0 30px #fff; } }

        .status-text {
            margin-top: 15px;
            font-size: 14px;
            color: var(--accent-color);
            letter-spacing: 3px;
        }

        /* Response Area */
        .response-box {
            flex-grow: 1;
            background: var(--secondary-bg);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            overflow-y: auto;
            font-size: 16px;
            line-height: 1.5;
            white-space: pre-wrap;
            position: relative;
        }

        .response-box::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 20px;
            background: linear-gradient(transparent, var(--secondary-bg));
            pointer-events: none;
        }

        .response-content {
            margin: 0;
        }

        /* Typing effect cursor */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background-color: var(--accent-color);
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 4px;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Command History */
        .history-box {
            height: 100px;
            background: var(--secondary-bg);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
            overflow-y: auto;
            font-size: 12px;
            color: rgba(224, 247, 255, 0.7);
        }

        .history-item { margin-bottom: 4px; }
        .history-time { color: var(--accent-color); margin-right: 8px; }

        /* Input Area */
        .input-area {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex-grow: 1;
            background: var(--secondary-bg);
            border: 1px solid rgba(0, 212, 255, 0.4);
            border-radius: 6px;
            padding: 12px 15px;
            color: var(--text-color);
            font-family: var(--font-family);
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        button {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--accent-color);
            border-radius: 6px;
            color: var(--accent-color);
            padding: 0 20px;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.3s, transform 0.1s;
        }

        button:hover {
            background: rgba(0, 212, 255, 0.3);
        }
        button:active { transform: scale(0.95); }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 212, 255, 0.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 212, 255, 0.6); }

        .sys-stats {
            display: flex;
            gap: 15px;
            font-size: 12px;
            color: rgba(0, 212, 255, 0.8);
            margin-bottom: 10px;
        }
        .stat-item {
            background: var(--secondary-bg);
            padding: 4px 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="hud-container">
        <div class="header">
            <div class="title">J.A.R.V.I.S.</div>
            <div class="status-dot" id="status-dot"></div>
        </div>

        <div class="sys-stats">
            <div class="stat-item" id="cpu-stat">CPU: --%</div>
            <div class="stat-item" id="ram-stat">RAM: --%</div>
            <div class="stat-item" id="time-stat">--:--</div>
        </div>

        <div class="visualizer-container">
            <div class="arc-reactor" id="arc-reactor">
                <div class="arc-ring outer"></div>
                <div class="arc-ring inner"></div>
                <div class="arc-core"></div>
            </div>
            <div class="status-text" id="status-text">INITIALIZING...</div>
        </div>

        <div class="response-box" id="response-box">
            <div id="response-content" class="response-content">Establishing connection to mainframe...</div><span class="cursor" id="cursor"></span>
        </div>

        <div class="history-box" id="history-box"></div>

        <div class="input-area">
            <input type="text" id="command-input" placeholder="Enter command for J.A.R.V.I.S..." autocomplete="off">
            <button id="send-btn">►</button>
        </div>
    </div>

    <!-- Socket.IO library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const socket = io();
            
            const responseBox = document.getElementById('response-box');
            const responseContent = document.getElementById('response-content');
            const historyBox = document.getElementById('history-box');
            const commandInput = document.getElementById('command-input');
            const sendBtn = document.getElementById('send-btn');
            const statusText = document.getElementById('status-text');
            const statusDot = document.getElementById('status-dot');
            const arcReactor = document.getElementById('arc-reactor');
            const cpuStat = document.getElementById('cpu-stat');
            const ramStat = document.getElementById('ram-stat');
            const timeStat = document.getElementById('time-stat');
            const cursor = document.getElementById('cursor');

            // Time update
            setInterval(() => {
                const now = new Date();
                timeStat.textContent = now.toLocaleTimeString('en-US', { hour12: false });
            }, 1000);

            // Socket events
            socket.on('connect', () => {
                addBootStep('Web Interface', true);
            });

            socket.on('status_update', (data) => {
                statusText.textContent = data.status;
                statusDot.style.backgroundColor = data.color;
                statusDot.style.boxShadow = `0 0 10px ${data.color}`;
            });

            socket.on('set_active', (data) => {
                if (data.active) {
                    arcReactor.classList.add('active');
                } else {
                    arcReactor.classList.remove('active');
                }
            });

            socket.on('command_history', (data) => {
                const item = document.createElement('div');
                item.className = 'history-item';
                const now = new Date();
                const time = now.toLocaleTimeString('en-US', { hour12: false });
                item.innerHTML = `<span class="history-time">[${time}]</span> ${data.text}`;
                historyBox.appendChild(item);
                
                // Keep only last 15
                if (historyBox.children.length > 15) {
                    historyBox.removeChild(historyBox.firstChild);
                }
                historyBox.scrollTop = historyBox.scrollHeight;
            });

            socket.on('stats_update', (data) => {
                if (data.cpu !== undefined) cpuStat.textContent = `CPU: ${data.cpu}%`;
                if (data.ram !== undefined) ramStat.textContent = `RAM: ${data.ram}%`;
            });

            socket.on('boot_step', (data) => {
                addBootStep(data.module, data.success);
            });

            // Typing effect variables
            let typingQueue = [];
            let isTyping = false;
            let currentText = responseContent.textContent;

            socket.on('response', (data) => {
                // Clear existing and start new typing
                currentText = "";
                responseContent.textContent = "";
                typeText(data.text);
            });

            function typeText(text) {
                isTyping = true;
                let i = 0;
                cursor.style.display = 'inline-block';
                
                function typeChar() {
                    if (i < text.length) {
                        currentText += text.charAt(i);
                        responseContent.textContent = currentText;
                        i++;
                        responseBox.scrollTop = responseBox.scrollHeight;
                        setTimeout(typeChar, 20); // Typing speed
                    } else {
                        isTyping = false;
                    }
                }
                typeChar();
            }

            function addBootStep(module, success) {
                const icon = success ? '✓' : '✗';
                const current = responseContent.textContent;
                responseContent.textContent = current + `\n  [${icon}] ${module}`;
                responseBox.scrollTop = responseBox.scrollHeight;
            }

            // Sending commands
            function sendCommand() {
                const text = commandInput.value.trim();
                if (text) {
                    socket.emit('command', { text: text });
                    commandInput.value = '';
                }
            }

            sendBtn.addEventListener('click', sendCommand);
            commandInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendCommand();
                }
            });
            
            // Focus input on load
            commandInput.focus();
        });
    </script>
</body>
</html>
